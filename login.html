<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="form-container">

        <div class="form-card">

            <h1>Welcome Back</h1>

            <p>
                Login to continue your quiz journey
            </p>

            <form id="loginForm">

                <div class="input-group">

                    <i class="fa fa-envelope"></i>

                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Enter Email"
                        required>

                </div>

                <div class="input-group">

                    <i class="fa fa-lock"></i>

                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="Enter Password"
                        required>

                </div>

                <div class="options">

                    <label>

                        <input
                            type="checkbox"
                            id="showPassword">

                        Show Password

                    </label>

                </div>

                <div id="loginMessage"></div>

                <button
                    type="submit"
                    class="primary-btn">

                    Login

                </button>

            </form>

            <div class="form-footer">

                Don't have an account?

                <a href="register.html">

                    Register Here

                </a>

            </div>

        </div>

    </div>

    <script src="js/auth.js"></script>

</body>

</html>
