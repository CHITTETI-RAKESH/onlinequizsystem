<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Quiz Exam</title>

<link rel="stylesheet"
      href="css/style.css">

</head>

<body>

<div class="quiz-container">

    <div class="quiz-header">

        <h1>Online Quiz Exam</h1>

        <div id="timer">
            60
        </div>

    </div>

    <div class="progress-container">

        <div id="progress-bar"></div>

    </div>

    <div class="question-box">

        <h2 id="question"></h2>

        <div id="options">

        </div>

    </div>

    <div class="buttons">

        <button id="prevBtn">

            Previous

        </button>

        <button id="nextBtn">

            Next

        </button>

        <button id="submitBtn">

            Submit Quiz

        </button>

    </div>

</div>

<script src="js/quiz.js"></script>

</body>

</html>
